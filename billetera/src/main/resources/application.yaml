spring:
  application:
    name: billetera

  devtools:
    restart:
      enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA}
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  rabbitmq:
    addresses: ${RABBITMQ_URL}
# management:
management:
  otlp:
    metrics:
      export:
        enabled: false # Aqui deberia ir la URL del collector
        #url: ${OTEL_COLLECTOR_URL}

# JWT: configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION}

