global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'microservices'
    # Configura aquí las rutas de métricas de tus servicios ej. /metrics
    static_configs:
      - targets: 
        - 'api-gateway:3000'
        - 'auth-service:3000'
        - 'user-service:3000'
        - 'event-service:3000'
        - 'notification-service:3000'
